<svg width="100%" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg">
<style>
@keyframes wave1{0%,100%{transform:translateX(0)}50%{transform:translateX(-16px)}}
@keyframes wave2{0%,100%{transform:translateX(0)}50%{transform:translateX(12px)}}
@keyframes wave3{0%,100%{transform:translateX(0)}50%{transform:translateX(-8px)}}
@keyframes sunpulse{0%,100%{opacity:1}50%{opacity:0.82}}
@keyframes twinkle1{0%,100%{opacity:0.9}40%{opacity:0.15}}
@keyframes twinkle2{0%,100%{opacity:0.4}60%{opacity:1}}
@keyframes twinkle3{0%,100%{opacity:0.7}20%{opacity:0.1}}
@keyframes birdfly{0%{transform:translateX(0) translateY(0)}50%{transform:translateX(40px) translateY(-5px)}100%{transform:translateX(80px) translateY(-2px)}}
@keyframes birdflyB{0%{transform:translateX(0) translateY(0)}50%{transform:translateX(-50px) translateY(-6px)}100%{transform:translateX(-90px) translateY(-1px)}}
@keyframes cloudmove{0%{transform:translateX(0)}100%{transform:translateX(36px)}}
@keyframes nameglow{0%,100%{opacity:1}50%{opacity:0.7}}
@keyframes shimmer{0%{opacity:0.12}50%{opacity:0.3}100%{opacity:0.12}}
</style>

